version: '3.8'

services:
  postgres:
    image: timescale/timescaledb-ha:pg16-ts2.14
    container_name: radar-postgres
    environment:
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar123
      POSTGRES_DB: radar_defesa_civil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radar_defesa_civil"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: radar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: radar-minio
    environment:
      MINIO_ROOT_USER: radar_admin
      MINIO_ROOT_PASSWORD: radar_secret_123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Development only - for viewing tiles
  tile-server:
    image: nginx:alpine
    container_name: radar-tiles
    ports:
      - "8080:80"
    volumes:
      - tiles_data:/usr/share/nginx/html:ro
      - ./nginx/tiles.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  tiles_data:

networks:
  default:
    name: radar-network
