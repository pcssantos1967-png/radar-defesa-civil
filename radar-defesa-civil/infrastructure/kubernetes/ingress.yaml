apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radar-ingress
  labels:
    app: radar-defesa-civil
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  tls:
    - hosts:
        - radar.defesacivil.gov.br
        - api.radar.defesacivil.gov.br
      secretName: radar-tls-secret
  rules:
    # API subdomain
    - host: api.radar.defesacivil.gov.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: radar-api
                port:
                  number: 3001
    # Main domain - Web frontend
    - host: radar.defesacivil.gov.br
      http:
        paths:
          # API routes on main domain
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: radar-api
                port:
                  number: 3001
          # WebSocket endpoint
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: radar-api
                port:
                  number: 3001
          # Radar processor API
          - path: /radar-api
            pathType: Prefix
            backend:
              service:
                name: radar-processor
                port:
                  number: 8000
          # Web frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: radar-web
                port:
                  number: 3000
---
# WebSocket-specific ingress for Socket.IO
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: radar-websocket-ingress
  labels:
    app: radar-defesa-civil
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - radar.defesacivil.gov.br
      secretName: radar-tls-secret
  rules:
    - host: radar.defesacivil.gov.br
      http:
        paths:
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: radar-api
                port:
                  number: 3001
