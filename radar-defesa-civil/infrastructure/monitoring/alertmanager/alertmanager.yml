global:
  # SMTP configuration for email alerts
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alertas@defesacivil.gov.br'
  smtp_auth_username: 'alertas@defesacivil.gov.br'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # Slack configuration
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # Default resolve timeout
  resolve_timeout: 5m

# Route tree
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'instance']

  # Wait before sending first notification for a new group
  group_wait: 30s

  # Wait before sending notification about new alerts in existing group
  group_interval: 5m

  # Wait before re-sending notification
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Warning alerts
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 1m
      repeat_interval: 4h

    # Business alerts - special handling
    - match_re:
        alertname: ^(HighActiveAlerts|CriticalAlertsUnacknowledged|RadarData.*)$
      receiver: 'operations-receiver'
      group_wait: 30s
      repeat_interval: 30m

# Inhibition rules
inhibit_rules:
  # Don't send warning if critical is already firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  # Don't alert about containers if node is down
  - source_match:
      alertname: 'NodeDown'
    target_match_re:
      alertname: 'Container.*'
    equal: ['instance']

# Receivers
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'monitoramento@defesacivil.gov.br'
        send_resolved: true
        headers:
          subject: '[Radar] {{ .Status | toUpper }} - {{ .CommonLabels.alertname }}'

  - name: 'critical-receiver'
    email_configs:
      - to: 'critico@defesacivil.gov.br,plantao@defesacivil.gov.br'
        send_resolved: true
        headers:
          subject: '[CRÍTICO] {{ .CommonLabels.alertname }} - {{ .CommonAnnotations.summary }}'
    slack_configs:
      - channel: '#alertas-criticos'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    # Webhook for SMS/WhatsApp integration
    webhook_configs:
      - url: 'http://radar-api:3001/api/v1/webhooks/alert'
        send_resolved: true

  - name: 'warning-receiver'
    email_configs:
      - to: 'monitoramento@defesacivil.gov.br'
        send_resolved: true
        headers:
          subject: '[Aviso] {{ .CommonLabels.alertname }}'
    slack_configs:
      - channel: '#alertas-monitoramento'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}⚠️{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'

  - name: 'operations-receiver'
    email_configs:
      - to: 'operacoes@defesacivil.gov.br'
        send_resolved: true
        headers:
          subject: '[Operações] {{ .CommonLabels.alertname }}'
    slack_configs:
      - channel: '#operacoes-radar'
        send_resolved: true
        title: '{{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'
